<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Дино-Мундиаль</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>

:root {
  --bg:        #f0f6ff;
  --bg2:       #ffffff;
  --bg3:       #e8f2ff;
  --sky:       #3aaee0;
  --sky2:      #1a8fc7;
  --sky-light: #d6eef9;
  --gold:      #d4a017;
  --gold2:     #f0c842;
  --gold3:     #fff3c0;
  --white:     #ffffff;
  --dark:      #1a2a3a;
  --muted:     #5a7a9a;
  --border:    rgba(58,174,224,0.25);
  --border2:   rgba(58,174,224,0.12);
  --border-g:  rgba(212,160,23,0.3);
  --shadow:    0 4px 24px rgba(58,174,224,0.15);
  --shadow-g:  0 4px 24px rgba(212,160,23,0.25);
  --glow-sky:  0 0 20px rgba(58,174,224,0.3);
  --glow-gold: 0 0 20px rgba(212,160,23,0.35);
  --radius:    14px;
  --radius-sm: 9px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:15px; }

body {
  font-family:'Inter',sans-serif;
  background: linear-gradient(180deg, #dceeff 0%, #f0f6ff 40%, #fafcff 100%);
  color:var(--dark);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* subtle star sparkles bg */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(240,200,66,0.12) 0%, transparent 40%),
    radial-gradient(circle at 85% 10%, rgba(58,174,224,0.15) 0%, transparent 40%),
    radial-gradient(circle at 50% 80%, rgba(212,160,23,0.08) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}

/* ══ LOADER ══ */
#loader {
  position:fixed; inset:0;
  background:linear-gradient(135deg, #dceeff, #f5fbff);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:9999; transition:opacity 0.5s; gap:1rem;
}
.loader-icon { font-size:3rem; animation:spin 1.2s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loader p {
  font-family:'Montserrat',sans-serif; font-weight:700;
  font-size:0.75rem; letter-spacing:0.3em;
  color:var(--sky2); text-transform:uppercase;
}
.loader-bar {
  width:120px; height:3px;
  background:rgba(58,174,224,0.2); border-radius:2px; overflow:hidden;
}
.loader-bar-fill {
  width:40%; height:100%; border-radius:2px;
  background:linear-gradient(90deg, var(--sky), var(--gold2));
  animation:barMove 1s ease-in-out infinite alternate;
}
@keyframes barMove {
  from { transform:translateX(-100%); }
  to   { transform:translateX(250%); }
}

/* ══ LANG BAR ══ */
#lang-bar {
  position:sticky; top:0; z-index:100;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
  padding:0.65rem 1.2rem;
  box-shadow:0 2px 12px rgba(58,174,224,0.1);
}
.lang-bar-logo {
  font-family:'Montserrat',sans-serif;
  font-size:0.8rem; font-weight:800;
  letter-spacing:0.1em; color:var(--muted); text-transform:uppercase;
}
.lang-bar-logo em { font-style:normal; color:var(--sky); }
.lang-btns { display:flex; gap:0.35rem; }
.lang-btn {
  padding:0.38rem 1rem; border-radius:20px;
  border:1.5px solid var(--border);
  background:transparent; color:var(--muted);
  cursor:pointer; font-weight:700; font-size:0.72rem;
  letter-spacing:0.08em; text-transform:uppercase;
  font-family:'Montserrat',sans-serif; transition:all 0.2s;
}
.lang-btn.active {
  background:linear-gradient(135deg, var(--sky), var(--sky2));
  color:#fff; border-color:var(--sky);
  box-shadow:var(--glow-sky);
}
.lang-btn:hover:not(.active) { border-color:var(--sky); color:var(--sky); }

/* ══ MAIN ══ */
#main-content { opacity:0; transition:opacity 0.4s; position:relative; z-index:1; }
#main-content.loaded { opacity:1; }

/* ══ PAGE WRAPPER ══ */
#page-blocks {
  max-width:600px; margin:0 auto;
  padding:1.2rem;
  display:flex; flex-direction:column; gap:1rem;
}

/* ══ BLOCK FRAME ══ */
.block-frame {
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
  position:relative;
}
/* top accent line */
.block-frame::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--sky), var(--gold2), var(--sky));
  border-radius:var(--radius) var(--radius) 0 0;
}

/* ══ BLOCK HEADER BAR ══ */
.block-header {
  background:linear-gradient(135deg, rgba(58,174,224,0.08), rgba(58,174,224,0.03));
  border-bottom:1px solid var(--border2);
  padding:0.85rem 1.2rem 0.85rem 1rem;
  display:flex; align-items:center; gap:0.6rem;
  margin-top:3px; /* offset top line */
}
.block-header-dot {
  width:9px; height:9px; border-radius:50%;
  background:linear-gradient(135deg, var(--sky), var(--sky2));
  box-shadow:var(--glow-sky); flex-shrink:0;
}
.block-header-title {
  font-family:'Montserrat',sans-serif;
  font-weight:800; font-size:0.78rem;
  letter-spacing:0.16em; text-transform:uppercase;
  color:var(--sky2);
}

/* ══ BLOCK BODY ══ */
.block-body {
  padding:1.2rem;
  display:flex; flex-direction:column; gap:0.65rem;
}

/* ══ HEADER 1 — centered ══ */
.s-header1 {
  font-family:'Montserrat',sans-serif; font-weight:900;
  font-size:clamp(1.1rem, 4vw, 1.35rem);
  letter-spacing:0.03em; color:var(--dark);
  text-align:center;
  padding:0.4rem 0 0.5rem;
}
.s-header1::after {
  content:''; display:block;
  width:40px; height:2.5px;
  background:linear-gradient(90deg, var(--sky), var(--gold2));
  border-radius:2px; margin:0.4rem auto 0;
}

/* ══ HEADER 2 ══ */
.s-header2 {
  font-family:'Montserrat',sans-serif; font-weight:800;
  font-size:clamp(1rem, 3.5vw, 1.15rem);
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  text-align:center; padding:0.25rem 0; letter-spacing:0.02em;
}

/* ══ HEADER 3 ══ */
.s-header3 {
  font-family:'Inter',sans-serif; font-weight:600; font-size:0.88rem;
  color:var(--dark); line-height:1.6;
  padding:0.8rem 1rem;
  background:linear-gradient(135deg, rgba(58,174,224,0.06), rgba(58,174,224,0.02));
  border:1px solid var(--border2);
  border-left:3px solid var(--sky);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
}

/* ══ TEXT ══ */
.s-text {
  font-size:0.88rem; color:var(--muted);
  line-height:1.78; font-weight:400;
}

/* ══ INFO TEXT ══ */
.s-info {
  display:flex; align-items:flex-start; gap:0.6rem;
  background:linear-gradient(135deg, rgba(212,160,23,0.08), rgba(240,200,66,0.05));
  border:1px solid var(--border-g);
  border-radius:var(--radius-sm);
  padding:0.75rem 1rem;
  font-size:0.86rem; color:#7a5800; line-height:1.65;
  font-weight:500;
}
.s-info::before { content:'✨'; flex-shrink:0; font-size:1rem; margin-top:0.05rem; }

/* ══ REWARD TABLE ══ */
.reward-wrap {
  overflow-x:auto; border-radius:var(--radius-sm);
  border:1.5px solid var(--border); margin-top:0.2rem;
  box-shadow:0 2px 8px rgba(58,174,224,0.08);
}
.reward-table { width:100%; border-collapse:collapse; font-size:0.84rem; }
.reward-table thead tr {
  background:linear-gradient(135deg, rgba(58,174,224,0.12), rgba(58,174,224,0.06));
}
.reward-table thead th {
  font-family:'Montserrat',sans-serif; font-weight:700;
  font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--sky2); padding:0.75rem 0.8rem;
  text-align:center; white-space:nowrap;
  border-bottom:1.5px solid var(--border);
}
.reward-table thead th:first-child { text-align:left; }
.reward-table tbody tr {
  border-bottom:1px solid rgba(58,174,224,0.08);
  transition:background 0.2s;
}
.reward-table tbody tr:last-child { border-bottom:none; }
.reward-table tbody tr:hover {
  background:linear-gradient(135deg, rgba(58,174,224,0.05), rgba(240,200,66,0.03));
}
.reward-table tbody td { padding:0.65rem 0.8rem; text-align:center; color:var(--muted); }
.reward-table tbody td:first-child {
  text-align:left; color:var(--dark);
  font-weight:600; font-family:'Montserrat',sans-serif; font-size:0.79rem;
}
.reward-table tbody td:nth-child(2) { color:var(--sky2); font-weight:600; }
.reward-table tbody td:last-child {
  color:var(--gold); font-weight:700;
  font-family:'Montserrat',sans-serif;
}

/* ══ GIFT GRID — always 5 cols ══ */
.gifts-grid {
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:0.5rem;
}
.gift-card {
  background:linear-gradient(180deg, #f8fbff, #ffffff);
  border:1.5px solid var(--border2);
  border-radius:var(--radius-sm);
  padding:0.65rem 0.2rem 0.5rem;
  text-align:center;
  display:flex; flex-direction:column;
  align-items:center; gap:0.3rem;
  transition:all 0.22s; cursor:default;
  position:relative; overflow:hidden;
}
.gift-card::after {
  content:''; position:absolute;
  bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, var(--sky), var(--gold2));
  opacity:0; transition:opacity 0.2s;
}
.gift-card:hover {
  border-color:var(--sky);
  background:linear-gradient(180deg, rgba(58,174,224,0.06), #ffffff);
  transform:translateY(-4px);
  box-shadow:0 8px 20px rgba(58,174,224,0.2);
}
.gift-card:hover::after { opacity:1; }
.gift-card img {
  width:44px; height:44px; object-fit:contain;
  transition:transform 0.22s;
}
.gift-card:hover img { transform:scale(1.12); }
.gift-name {
  font-family:'Montserrat',sans-serif;
  font-size:0.55rem; font-weight:700;
  letter-spacing:0.02em; color:var(--muted);
  text-transform:uppercase; line-height:1.3;
  word-break:break-word; text-align:center;
}

/* ══ RULES FAB ══ */
#rules-fab {
  position:fixed; bottom:1.2rem; right:1.2rem; z-index:500;
  height:46px; padding:0 1.3rem; border-radius:23px;
  background:linear-gradient(135deg, var(--sky), var(--sky2));
  border:none; cursor:pointer;
  display:flex; align-items:center; gap:0.5rem;
  font-family:'Montserrat',sans-serif; font-size:0.78rem;
  font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
  color:#fff; box-shadow:0 4px 20px rgba(58,174,224,0.45);
  transition:all 0.2s;
}
#rules-fab:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(58,174,224,0.55);
  background:linear-gradient(135deg, var(--gold2), var(--gold));
}

/* ══ OVERLAY ══ */
#rules-overlay {
  position:fixed; inset:0;
  background:rgba(10,30,60,0.4);
  z-index:600; opacity:0; pointer-events:none;
  transition:opacity 0.25s; backdrop-filter:blur(4px);
}
#rules-overlay.open { opacity:1; pointer-events:all; }

/* ══ DRAWER ══ */
#rules-drawer {
  position:fixed; top:0; right:-100%;
  width:min(420px,100vw); height:100vh;
  background:#f8fbff;
  border-left:1.5px solid var(--border);
  z-index:700; overflow-y:auto;
  transition:right 0.35s cubic-bezier(0.4,0,0.2,1);
  display:flex; flex-direction:column;
  box-shadow:-8px 0 40px rgba(58,174,224,0.15);
}
#rules-drawer.open { right:0; }
.drawer-header {
  background:linear-gradient(135deg, rgba(58,174,224,0.12), rgba(58,174,224,0.04));
  border-bottom:1px solid var(--border);
  padding:1rem 1.2rem;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:1;
  backdrop-filter:blur(12px);
}
.drawer-header h2 {
  font-family:'Montserrat',sans-serif;
  font-size:0.85rem; font-weight:800;
  letter-spacing:0.15em; text-transform:uppercase; color:var(--dark);
}
#close-drawer {
  width:32px; height:32px; border-radius:8px;
  background:rgba(58,174,224,0.08);
  border:1px solid var(--border); color:var(--muted);
  font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
#close-drawer:hover {
  background:rgba(220,60,60,0.1);
  border-color:rgba(220,60,60,0.3); color:#e05555;
  transform:rotate(90deg);
}
.drawer-body {
  padding:1.2rem; flex:1;
  display:flex; flex-direction:column; gap:0.5rem;
}
.rules-section-title {
  font-family:'Montserrat',sans-serif; font-weight:800;
  font-size:0.8rem; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--sky2); padding:0.7rem 0 0.4rem;
  border-bottom:1px solid var(--border2); margin-bottom:0.1rem;
}
.rules-section-title:first-child { padding-top:0; }
.rules-h2 {
  font-family:'Montserrat',sans-serif; font-weight:700;
  font-size:0.88rem;
  background:linear-gradient(135deg, var(--gold), var(--gold2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  text-align:center; padding:0.3rem 0;
}
.rules-text { font-size:0.84rem; color:var(--muted); line-height:1.72; }
.rules-info {
  background:linear-gradient(135deg, rgba(58,174,224,0.07), rgba(58,174,224,0.03));
  border-left:3px solid var(--sky); border-radius:0 6px 6px 0;
  padding:0.6rem 0.9rem; font-size:0.83rem; color:var(--sky2); line-height:1.6;
}
.rules-warning {
  background:rgba(212,160,23,0.07); border-left:3px solid var(--gold);
  border-radius:0 6px 6px 0; padding:0.6rem 0.9rem;
  font-size:0.83rem; color:#8a5f00; line-height:1.6;
}
.rules-formula {
  background:linear-gradient(135deg, rgba(58,174,224,0.06), rgba(212,160,23,0.06));
  border:1.5px dashed rgba(58,174,224,0.35);
  border-radius:10px; padding:0.8rem 1rem;
  font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.88rem;
  color:var(--sky2); text-align:center; letter-spacing:0.04em;
}

/* ══ FOOTER ══ */
footer {
  text-align:center; padding:2rem 1rem;
  background:transparent;
  border-top:1px solid var(--border2);
  position:relative; z-index:1;
}
footer p {
  font-family:'Montserrat',sans-serif; font-size:0.7rem;
  font-weight:700; letter-spacing:0.2em; text-transform:uppercase;
  color:rgba(90,122,154,0.5);
}
footer p em { font-style:normal; color:var(--sky); opacity:0.8; }

/* ══ ERROR ══ */
.error-box {
  background:rgba(220,60,60,0.05); border:1px solid rgba(220,60,60,0.2);
  border-radius:var(--radius); padding:2rem 1.5rem; text-align:center; color:#c04040;
}
.error-box h3 {
  font-family:'Montserrat',sans-serif; font-weight:800;
  font-size:1rem; margin-bottom:0.5rem; letter-spacing:0.1em;
}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:#f0f6ff; }
::-webkit-scrollbar-thumb {
  background:linear-gradient(var(--sky), var(--gold2)); border-radius:2px;
}

/* ══ MOBILE ══ */
@media(max-width:480px) {
  #page-blocks { padding:0.8rem; gap:0.8rem; }
  .block-body { padding:0.9rem; gap:0.55rem; }
  #rules-fab { bottom:0.8rem; right:0.8rem; height:42px; font-size:0.72rem; }
  .gift-card img { width:36px; height:36px; }
  .gift-name { font-size:0.5rem; }
  .gifts-grid { gap:0.3rem; }
}

</style>
</head>
<body>

<div id="loader">
  <div class="loader-icon">⚽</div>
  <p id="loader-text">Loading</p>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="lang-bar">
  <div class="lang-bar-logo">⚽ Bigo Live <em>СНГ</em></div>
  <div class="lang-btns">
    <button class="lang-btn active" onclick="setLang('rus')" id="btn-rus">🇷🇺 RUS</button>
    <button class="lang-btn"        onclick="setLang('uzb')" id="btn-uzb">🇺🇿 UZB</button>
  </div>
</div>

<div id="main-content">
  <div id="page-blocks"></div>
</div>

<button id="rules-fab" onclick="openDrawer()">
  📋 <span id="fab-label">Правила</span>
</button>

<div id="rules-overlay" onclick="closeDrawer()"></div>

<div id="rules-drawer">
  <div class="drawer-header">
    <h2 id="drawer-title">📋 Правила</h2>
    <button id="close-drawer" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<footer>
  <p>⚽ <em>Дино-Мундиаль</em> · 16–20 июля 2026 · Bigo Live СНГ</p>
</footer>

<script>
const SHEET_ID  = '1o9RJDu_bTcp4rlGMC4nMKZu3VPuixmzmVFgboBYWwt4';
const MAIN_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
const RULES_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=1286274957`;

let currentLang = 'rus';
let mainData    = [];
let rulesData   = [];

async function fetchSheet(url) {
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
  return json.table.rows.map(row =>
    row.c.map(cell => (cell && cell.v !== null && cell.v !== undefined) ? String(cell.v).trim() : '')
  );
}

function parseImgName(cell) {
  const m = cell.match(/^(.*?)\s+(https?:\/\/\S+)$/);
  return m ? { name: m[1].trim(), img: m[2].trim() } : { name: cell, img: '' };
}

function langCol() { return currentLang === 'rus' ? 2 : 3; }

/* ══ BUILD MAIN ══ */
function buildMain() {
  const container = document.getElementById('page-blocks');
  container.innerHTML = '';

  const blocks = {};
  mainData.forEach(row => {
    const b = row[0];
    if (!b || b === 'Block') return;
    if (!blocks[b]) blocks[b] = [];
    blocks[b].push(row);
  });

  Object.keys(blocks)
    .sort((a, b) => Number(a) - Number(b))
    .forEach(blockNum => {
      const rows = blocks[blockNum];
      const lc   = langCol();

      let blockTitle = '';
      rows.forEach(r => {
        if (r[1] === 'Header 1' && !blockTitle)
          blockTitle = (r[lc] || r[2] || '').trim();
      });

      const frame = document.createElement('div');
      frame.className = 'block-frame';

      if (blockTitle) {
        const hdr = document.createElement('div');
        hdr.className = 'block-header';
        hdr.innerHTML = `<div class="block-header-dot"></div>
                         <div class="block-header-title">${blockTitle}</div>`;
        frame.appendChild(hdr);
      }

      const body = document.createElement('div');
      body.className = 'block-body';
      buildSection(body, rows, blockTitle);
      frame.appendChild(body);
      container.appendChild(frame);
    });
}

/* ══ SECTION BUILDER ══ */
function buildSection(el, rows, skipTitle) {
  const lc = langCol();
  let html       = '';
  let giftCells  = [];
  let rewardRows = [];
  let skippedH1  = false;

  rows.forEach(row => {
    const style = row[1];
    const text  = (row[lc] || row[2] || '').trim();

    if (style === 'Header 1') {
      if (!skippedH1 && skipTitle) { skippedH1 = true; return; }
      html += `<div class="s-header1">${text}</div>`;
      return;
    }

    switch (style) {
      case 'Header 2':
        html += `<div class="s-header2">${text}</div>`; break;
      case 'Header 3':
        html += `<div class="s-header3">${text}</div>`; break;
      case 'Text':
        html += `<div class="s-text">${text}</div>`; break;
      case 'infotext':
        html += `<div class="s-info">${text}</div>`; break;
      case 'RewardTable':
        rewardRows.push(text.split(',').map(s => s.trim())); break;
      case 'GiftTable':
        text.split(',').forEach(c => giftCells.push(c.trim())); break;
      default:
        if (text) html += `<div class="s-text">${text}</div>`;
    }
  });

  if (rewardRows.length) {
    const [header, ...body] = rewardRows;
    html += `<div class="reward-wrap"><table class="reward-table">
      <thead><tr>${header.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>`;
    body.forEach(r => {
      const c2 = r[1] ? Number(r[1].replace(/\D/g,'')).toLocaleString('ru-RU') : '';
      const c3 = r[2] ? Number(r[2].replace(/\D/g,'')).toLocaleString('ru-RU') : '';
      html += `<tr><td>${r[0]||''}</td><td>${c2}</td><td>${c3}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  }

  if (giftCells.length) {
    html += `<div class="gifts-grid">`;
    giftCells.forEach(cell => {
      const { name, img } = parseImgName(cell);
      if (!img) return;
      html += `<div class="gift-card">
        <img src="${img}" alt="${name}" loading="lazy" onerror="this.style.opacity='.15'"/>
        <div class="gift-name">${name}</div>
      </div>`;
    });
    html += `</div>`;
  }

  el.innerHTML += html;
}

/* ══ RULES DRAWER ══ */
function buildRules() {
  const lc   = langCol();
  const body = document.getElementById('drawer-body');
  let html   = '';
  const blocks = {};

  rulesData.forEach(row => {
    const b = row[0];
    if (!b || b === 'Block') return;
    if (!blocks[b]) blocks[b] = [];
    blocks[b].push(row);
  });

  Object.keys(blocks).sort((a,b) => Number(a)-Number(b)).forEach(blockNum => {
    blocks[blockNum].forEach(row => {
      const style = row[1];
      const text  = (row[lc] || row[2] || '').trim();
      if (!text) return;
      switch (style) {
        case 'Title':
          document.getElementById('drawer-title').textContent = `📋 ${text}`;
          document.getElementById('fab-label').textContent    = text;
          break;
        case 'Header 1':
          html += `<div class="rules-section-title">${text}</div>`; break;
        case 'Header 2':
          html += `<div class="rules-h2">${text}</div>`; break;
        case 'Text':
          html += `<div class="rules-text">${text}</div>`; break;
        case 'infotext':
          html += `<div class="rules-info">${text}</div>`; break;
        case 'Warningtext':
          html += `<div class="rules-warning">${text}</div>`; break;
        case 'formulatext':
          html += `<div class="rules-formula">${text}</div>`; break;
        default:
          html += `<div class="rules-text">${text}</div>`;
      }
    });
  });

  body.innerHTML = html;
}

/* ══ LANG ══ */
function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-rus').classList.toggle('active', lang === 'rus');
  document.getElementById('btn-uzb').classList.toggle('active', lang === 'uzb');
  buildMain();
  buildRules();
}

/* ══ DRAWER ══ */
function openDrawer() {
  document.getElementById('rules-drawer').classList.add('open');
  document.getElementById('rules-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('rules-drawer').classList.remove('open');
  document.getElementById('rules-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

/* ══ INIT ══ */
async function init() {
  const loaderText = document.getElementById('loader-text');
  try {
    loaderText.textContent = 'Connecting...';
    [mainData, rulesData] = await Promise.all([
      fetchSheet(MAIN_URL),
      fetchSheet(RULES_URL)
    ]);
    loaderText.textContent = 'Building...';
    buildMain();
    buildRules();

    const loader  = document.getElementById('loader');
    const content = document.getElementById('main-content');
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 500);
    content.classList.add('loaded');

  } catch(err) {
    console.error(err);
    document.getElementById('loader').style.display = 'none';
    document.getElementById('main-content').classList.add('loaded');
    document.getElementById('page-blocks').innerHTML = `
      <div style="padding:2rem 1rem">
        <div class="error-box">
          <h3>⚠️ DATA LOAD ERROR</h3>
          <p>Make sure the Google Sheet is public (Anyone with link → Viewer)</p>
          <p style="margin-top:.4rem;font-size:.75rem">${err.message}</p>
        </div>
      </div>`;
  }
}

init();
</script>
</body>
</html>
