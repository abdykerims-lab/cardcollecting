<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Дино-Мундиаль</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#f6f8fb;
      --surface:#ffffff;
      --surface-soft:#fbfcfe;
      --line:#e4ebf3;
      --line-strong:#d7e0eb;

      --text:#243443;
      --text-soft:#607284;
      --text-faint:#8796a6;

      --accent:#5d86b3;
      --accent-soft:#edf4fb;

      --gold:#b79a63;
      --gold-soft:#f8f3e9;

      --warning:#8d6b42;

      --shadow-sm:0 8px 24px rgba(34,56,79,.05);
      --shadow-md:0 16px 40px rgba(34,56,79,.07);

      --radius-lg:20px;
      --radius-md:16px;
      --radius-sm:12px;

      --container:980px;
    }

    *,
    *::before,
    *::after{
      box-sizing:border-box;
    }

    html{
      font-size:15px;
      -webkit-text-size-adjust:100%;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:'Inter',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 8%, rgba(183,154,99,.05), transparent 24%),
        radial-gradient(circle at 86% 6%, rgba(93,134,179,.05), transparent 26%),
        linear-gradient(180deg, #f9fbfd 0%, #f6f8fb 100%);
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }

    img{
      display:block;
      max-width:100%;
    }

    button{
      font:inherit;
    }

    .page{
      max-width:var(--container);
      margin:0 auto;
      padding:1rem 1rem 2rem;
    }

    /* loader */
    #loader{
      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(249,251,253,.9);
      backdrop-filter:blur(8px);
      transition:opacity .35s ease, visibility .35s ease;
    }

    #loader.hidden{
      opacity:0;
      visibility:hidden;
    }

    .loader-box{
      width:min(92vw,320px);
      padding:1.35rem 1.15rem;
      border-radius:22px;
      background:rgba(255,255,255,.96);
      border:1px solid var(--line);
      box-shadow:var(--shadow-md);
      text-align:center;
    }

    .loader-icon{
      font-size:1.7rem;
      margin-bottom:.55rem;
    }

    .loader-title{
      font-family:'Montserrat',sans-serif;
      font-size:.82rem;
      font-weight:700;
      letter-spacing:.15em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:.35rem;
    }

    #loader-text{
      color:var(--text-soft);
      font-size:.92rem;
      line-height:1.55;
    }

    .loader-line{
      height:4px;
      border-radius:999px;
      background:#edf2f7;
      margin-top:.9rem;
      overflow:hidden;
    }

    .loader-line > span{
      display:block;
      width:34%;
      height:100%;
      border-radius:inherit;
      background:linear-gradient(90deg, var(--accent), var(--gold));
      animation:lineMove 1.1s ease-in-out infinite;
    }

    @keyframes lineMove{
      0%{transform:translateX(-120%);}
      100%{transform:translateX(320%);}
    }

    /* top */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:.8rem;
      margin-bottom:1rem;
      padding:.15rem 0 .35rem;
    }

    .topbar-brand{
      min-width:0;
      font-family:'Montserrat',sans-serif;
      font-size:.82rem;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:var(--text-soft);
      white-space:nowrap;
    }

    .topbar-brand em{
      font-style:normal;
      color:var(--accent);
    }

    .lang-switch{
      display:inline-flex;
      align-items:center;
      gap:.3rem;
      padding:.2rem;
      border-radius:999px;
      background:rgba(255,255,255,.76);
      border:1px solid rgba(228,235,243,.95);
      flex-shrink:0;
    }

    .lang-btn{
      border:0;
      background:transparent;
      color:var(--text-soft);
      padding:.5rem .82rem;
      min-height:38px;
      border-radius:999px;
      cursor:pointer;
      font-family:'Montserrat',sans-serif;
      font-size:14px;
      font-weight:700;
      letter-spacing:.03em;
      transition:.18s ease;
    }

    .lang-btn.active{
      background:var(--accent);
      color:#fff;
    }

    /* tabs */
    .tabs-shell{
      margin-bottom:1rem;
    }

    .tabs{
      display:inline-flex;
      gap:.38rem;
      padding:.26rem;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      border:1px solid var(--line);
      box-shadow:var(--shadow-sm);
    }

    .tab-btn{
      border:0;
      background:transparent;
      color:var(--text-soft);
      padding:.72rem 1rem;
      min-height:42px;
      border-radius:999px;
      cursor:pointer;
      font-family:'Montserrat',sans-serif;
      font-size:14px;
      font-weight:700;
      letter-spacing:.01em;
      transition:.18s ease;
      white-space:nowrap;
    }

    .tab-btn.active{
      background:var(--surface);
      color:var(--accent);
      box-shadow:0 4px 12px rgba(34,56,79,.05);
    }

    .tab-panel{
      display:none;
    }

    .tab-panel.active{
      display:block;
    }

    .panel-stack{
      display:flex;
      flex-direction:column;
      gap:1rem;
    }

    /* section card */
    .section-card{
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      background:rgba(255,255,255,.95);
      box-shadow:var(--shadow-sm);
      overflow:hidden;
    }

    .section-body{
      padding:1rem;
      display:flex;
      flex-direction:column;
      gap:.72rem;
    }

    /* content styles */
    .style-h1{
      margin:0;
      font-family:'Montserrat',sans-serif;
      font-size:1rem;
      font-weight:800;
      line-height:1.35;
      letter-spacing:.08em;
      text-transform:uppercase;
      text-align:center;
      color:var(--text);
    }

    .style-h2{
      margin:0;
      font-family:'Montserrat',sans-serif;
      font-size:16px;
      font-weight:700;
      line-height:1.4;
      text-align:left;
      color:var(--gold);
    }

    .style-text{
      margin:0;
      font-size:14px;
      line-height:1.75;
      color:var(--text-soft);
    }

    .style-info{
      margin:0;
      padding:.8rem .9rem;
      border:1px solid #ece3d2;
      border-radius:var(--radius-sm);
      background:var(--gold-soft);
      color:#7c6a45;
      font-size:14px;
      line-height:1.7;
      text-align:center;
      font-weight:600;
    }

    .style-warning{
      margin:0;
      font-size:14px;
      line-height:1.75;
      color:var(--warning);
      font-style:italic;
    }

    /* reward table */
    .reward-wrap{
      width:100%;
    }

    .reward-table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      background:#fff;
    }

    .reward-table thead th{
      padding:.8rem .6rem;
      background:#f8fafc;
      border-bottom:1px solid var(--line);
      color:var(--text-faint);
      font-family:'Montserrat',sans-serif;
      font-size:14px;
      font-weight:700;
      line-height:1.35;
      text-align:center;
    }

    .reward-table thead th:first-child,
    .reward-table tbody td:first-child{
      text-align:left;
    }

    .reward-table tbody tr:not(:last-child) td{
      border-bottom:1px solid var(--line);
    }

    .reward-table tbody td{
      padding:.78rem .6rem;
      font-size:14px;
      line-height:1.45;
      text-align:center;
      vertical-align:middle;
      color:var(--text-soft);
      white-space:normal;
      overflow-wrap:anywhere;
    }

    .reward-table tbody td:first-child{
      color:var(--text);
      font-family:'Montserrat',sans-serif;
      font-weight:700;
    }

    .reward-table tbody td:nth-child(2){
      color:var(--accent);
      font-weight:600;
    }

    .reward-table tbody td:last-child{
      color:var(--gold);
      font-family:'Montserrat',sans-serif;
      font-weight:700;
    }

    /* gala gifts adaptive */
    .gala-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
      gap:.7rem;
    }

    .gala-card{
      border:1px solid #eadfca;
      border-radius:16px;
      background:linear-gradient(180deg, #fffdf8 0%, #fbf7ef 100%);
      padding:.8rem .7rem .7rem;
      box-shadow:0 8px 24px rgba(183,154,99,.08);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:.42rem;
      min-height:142px;
    }

    .gala-card img{
      width:58px;
      height:58px;
      object-fit:contain;
    }

    .gala-name{
      margin:0;
      font-family:'Montserrat',sans-serif;
      font-size:.66rem;
      font-weight:700;
      line-height:1.3;
      text-align:center;
      color:#886f42;
      text-transform:none;
      word-break:normal;
      overflow-wrap:anywhere;
    }

    /* normal gifts fixed 5 */
    .gift-grid{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:.5rem;
    }

    .gift-card{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:.58rem .22rem .45rem;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:.24rem;
      min-height:94px;
    }

    .gift-card img{
      width:36px;
      height:36px;
      object-fit:contain;
      margin-bottom:.04rem;
    }

    .gift-name{
      margin:0;
      max-width:100%;
      text-align:center;
      color:var(--text-faint);
      font-family:'Montserrat',sans-serif;
      font-size:.5rem;
      font-weight:700;
      line-height:1.14;
      text-transform:none;
      letter-spacing:0;
      word-break:normal;
      overflow-wrap:anywhere;
    }

    /* states */
    .state-box{
      padding:1.2rem 1rem;
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      background:rgba(255,255,255,.94);
      box-shadow:var(--shadow-sm);
      text-align:center;
    }

    .state-title{
      margin:0 0 .4rem;
      font-family:'Montserrat',sans-serif;
      font-size:.9rem;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--text);
    }

    .state-text{
      margin:0;
      color:var(--text-soft);
      font-size:.9rem;
      line-height:1.68;
    }

    .retry-btn{
      margin-top:.9rem;
      border:0;
      border-radius:999px;
      background:var(--accent);
      color:#fff;
      min-height:42px;
      padding:0 1rem;
      cursor:pointer;
      font-family:'Montserrat',sans-serif;
      font-size:.74rem;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    footer{
      max-width:var(--container);
      margin:0 auto;
      padding:.2rem 1rem 1.8rem;
      text-align:center;
    }

    footer p{
      margin:0;
      color:var(--text-faint);
      font-family:'Montserrat',sans-serif;
      font-size:.67rem;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      line-height:1.6;
    }

    footer em{
      font-style:normal;
      color:var(--accent);
    }

    @media (max-width:640px){
      .page{
        padding:.75rem .75rem 1.6rem;
      }

      .topbar{
        margin-bottom:.85rem;
        padding-bottom:.15rem;
      }

      .topbar-brand{
        font-size:.74rem;
        letter-spacing:.08em;
      }

      .lang-switch{
        background:transparent;
        border:0;
        padding:0;
      }

      .lang-btn{
        padding:.4rem .58rem;
        min-height:34px;
        font-size:13px;
      }

      .tabs-shell{
        margin-bottom:.85rem;
      }

      .tabs{
        width:100%;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:.3rem;
        padding:.24rem;
        border-radius:16px;
      }

      .tab-btn{
        min-width:0;
        width:100%;
        min-height:40px;
        padding:.68rem .52rem;
        font-size:14px;
        border-radius:12px;
        white-space:normal;
        line-height:1.2;
        text-align:center;
      }

      .panel-stack{
        gap:.8rem;
      }

      .section-body{
        padding:.9rem .85rem;
      }

      .style-h1{
        font-size:.96rem;
      }

      .reward-table thead th,
      .reward-table tbody td{
        font-size:13px;
        padding:.68rem .38rem;
      }

      .gala-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:.55rem;
      }

      .gala-card{
        min-height:128px;
        padding:.72rem .55rem .62rem;
      }

      .gala-card img{
        width:48px;
        height:48px;
      }

      .gala-name{
        font-size:.6rem;
      }

      .gift-card{
        min-height:84px;
        padding:.46rem .12rem .36rem;
        gap:.18rem;
      }

      .gift-card img{
        width:28px;
        height:28px;
      }

      .gift-name{
        font-size:.41rem;
        line-height:1.05;
      }
    }

    @media (max-width:420px){
      html{
        font-size:14px;
      }

      .topbar{
        gap:.55rem;
      }

      .topbar-brand{
        max-width:46%;
        font-size:.7rem;
        white-space:normal;
        line-height:1.28;
      }

      .lang-btn{
        padding:.38rem .5rem;
        min-height:32px;
      }

      .tab-btn{
        font-size:13px;
        padding:.62rem .42rem;
      }

      .reward-table thead th,
      .reward-table tbody td{
        font-size:12px;
      }

      .gala-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div id="loader" aria-live="polite" aria-busy="true">
    <div class="loader-box">
      <div class="loader-icon">⚽</div>
      <div class="loader-title">Дино-Мундиаль</div>
      <div id="loader-text">Загрузка данных…</div>
      <div class="loader-line"><span></span></div>
    </div>
  </div>

  <div class="page">
    <div class="topbar">
      <div class="topbar-brand">⚽ Bigo Live <em>СНГ</em></div>
      <div class="lang-switch" role="group" aria-label="Выбор языка">
        <button class="lang-btn active" id="btn-rus" onclick="setLang('rus')" aria-pressed="true">🇷🇺 RUS</button>
        <button class="lang-btn" id="btn-uzb" onclick="setLang('uzb')" aria-pressed="false">🇺🇿 UZB</button>
      </div>
    </div>

    <div class="tabs-shell">
      <div class="tabs" role="tablist" aria-label="Навигация по разделам">
        <button class="tab-btn active" id="tab-main" role="tab" aria-selected="true" aria-controls="panel-main" onclick="setTab('tab1')">Общие Условия</button>
        <button class="tab-btn" id="tab-rules" role="tab" aria-selected="false" aria-controls="panel-rules" onclick="setTab('tab2')">Правила Мероприятия</button>
      </div>
    </div>

    <section id="panel-main" class="tab-panel active" role="tabpanel" aria-labelledby="tab-main">
      <div class="panel-stack" id="content-tab1"></div>
    </section>

    <section id="panel-rules" class="tab-panel" role="tabpanel" aria-labelledby="tab-rules">
      <div class="panel-stack" id="content-tab2"></div>
    </section>
  </div>

  <footer>
    <p>⚽ <em>Дино-Мундиаль</em> · Bigo Live СНГ</p>
  </footer>

  <script>
    const SHEET_ID = '1o9RJDu_bTcp4rlGMC4nMKZu3VPuixmzmVFgboBYWwt4';
    const WEBPAGE_GID = '686428800';
    const WEBPAGE_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${WEBPAGE_GID}`;

    const STYLE = {
      TAB1: 'Tab1',
      TAB2: 'Tab2',
      H1: 'Header 1',
      H2: 'Header 2',
      TEXT: 'Text',
      INFO: 'infotext',
      WARNING: 'Warningtext',
      REWARD: 'RewardTable',
      GIFT: 'GiftTable',
      GALA: 'GiftTableGala'
    };

    let currentLang = 'rus';
    let currentTab = 'tab1';
    let pageRows = [];
    let tabsMeta = {
      tab1: 'Общие Условия',
      tab2: 'Правила Мероприятия'
    };

    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function langCol() {
      return currentLang === 'rus' ? 3 : 4;
    }

    function getLocalizedText(row) {
      const preferred = row?.[langCol()] || '';
      const fallback = row?.[3] || '';
      return String(preferred || fallback || '').trim();
    }

    function setLoaderText(text) {
      const el = document.getElementById('loader-text');
      if (el) el.textContent = text;
    }

    function extractGoogleVizJson(text) {
      const start = text.indexOf('{');
      const end = text.lastIndexOf('}');
      if (start === -1 || end === -1 || end <= start) {
        throw new Error('Некорректный ответ от Google Sheets');
      }
      return JSON.parse(text.slice(start, end + 1));
    }

    async function fetchSheet(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Ошибка загрузки (${res.status})`);

      const text = await res.text();
      const json = extractGoogleVizJson(text);

      if (!json.table || !Array.isArray(json.table.rows)) {
        throw new Error('Неверный формат данных таблицы');
      }

      return json.table.rows.map(row =>
        (row.c || []).map(cell =>
          (cell && cell.v !== null && cell.v !== undefined) ? String(cell.v).trim() : ''
        )
      );
    }

    function normalizeRows(rows) {
      const result = [];
      let lastBlock = '';
      let lastChild = '';

      rows.forEach((row, index) => {
        const blockRaw = String(row?.[0] || '').trim();
        const childRaw = String(row?.[1] || '').trim();
        const style = String(row?.[2] || '').trim();

        if (index === 0 && blockRaw === 'Block') return;
        if (!style) return;

        const block = blockRaw || lastBlock;
        const child = childRaw || lastChild;

        if (block) lastBlock = block;
        if (child) lastChild = child;

        result.push([
          block,
          child,
          style,
          String(row?.[3] || '').trim(),
          String(row?.[4] || '').trim()
        ]);
      });

      return result;
    }

    function parseTabsMeta(rows) {
      rows.forEach(row => {
        const block = String(row?.[0] || '').trim();
        const style = String(row?.[2] || '').trim();
        const text = getLocalizedText(row);

        if (style === STYLE.TAB1 && block === '1' && text) tabsMeta.tab1 = text;
        if (style === STYLE.TAB2 && block === '2' && text) tabsMeta.tab2 = text;
      });

      document.getElementById('tab-main').textContent = tabsMeta.tab1;
      document.getElementById('tab-rules').textContent = tabsMeta.tab2;
    }

    function setTab(tab) {
      currentTab = tab;
      const isTab1 = tab === 'tab1';

      document.getElementById('tab-main').classList.toggle('active', isTab1);
      document.getElementById('tab-rules').classList.toggle('active', !isTab1);

      document.getElementById('tab-main').setAttribute('aria-selected', String(isTab1));
      document.getElementById('tab-rules').setAttribute('aria-selected', String(!isTab1));

      document.getElementById('panel-main').classList.toggle('active', isTab1);
      document.getElementById('panel-rules').classList.toggle('active', !isTab1);
    }

    function setLang(lang) {
      currentLang = lang;

      const isRus = lang === 'rus';
      document.getElementById('btn-rus').classList.toggle('active', isRus);
      document.getElementById('btn-uzb').classList.toggle('active', !isRus);
      document.getElementById('btn-rus').setAttribute('aria-pressed', String(isRus));
      document.getElementById('btn-uzb').setAttribute('aria-pressed', String(!isRus));

      parseTabsMeta(pageRows);
      buildPage();
    }

    function isSafeUrl(url) {
      try {
        const u = new URL(url);
        return u.protocol === 'https:' || u.protocol === 'http:';
      } catch {
        return false;
      }
    }

    function parseGiftCell(cell) {
      const m = String(cell || '').match(/^(.*?)\s+(https?:\/\/\S+)$/);
      if (!m) return { name: String(cell || '').trim(), img: '' };
      const name = (m[1] || '').trim();
      const img = (m[2] || '').trim();
      return { name, img: isSafeUrl(img) ? img : '' };
    }

    function formatNumber(value, locale = 'ru-RU') {
      const normalized = String(value || '').replace(/[^\d.-]/g, '');
      const num = Number(normalized);
      return Number.isFinite(num) ? num.toLocaleString(locale) : String(value || '');
    }

    function groupByBlockChild(rows, targetBlock) {
      const groups = {};
      rows
        .filter(row => String(row?.[0] || '') === String(targetBlock))
        .forEach(row => {
          const child = String(row?.[1] || '0').trim() || '0';
          if (!groups[child]) groups[child] = [];
          groups[child].push(row);
        });
      return groups;
    }

    function renderRewardTable(rows) {
      const parsed = rows
        .map(r => getLocalizedText(r))
        .filter(Boolean)
        .map(text => text.split(',').map(v => v.trim()));

      if (!parsed.length) return '';

      const [head, ...body] = parsed;

      return `
        <div class="reward-wrap">
          <table class="reward-table">
            <thead>
              <tr>
                ${(head || []).map(h => `<th>${escapeHtml(h)}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${body.map(cols => `
                <tr>
                  <td>${escapeHtml(cols[0] || '')}</td>
                  <td>${escapeHtml(formatNumber(cols[1]))}</td>
                  <td>${escapeHtml(formatNumber(cols[2]))}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderGiftGrid(rows, isGala = false) {
      const items = rows
        .map(r => parseGiftCell(getLocalizedText(r)))
        .filter(item => item.img);

      if (!items.length) return '';

      if (isGala) {
        return `
          <div class="gala-grid">
            ${items.map(item => `
              <div class="gala-card">
                <img src="${escapeHtml(item.img)}" alt="${escapeHtml(item.name || 'gift')}" loading="lazy" onerror="this.style.opacity='.15'" />
                <p class="gala-name">${escapeHtml(item.name || 'Gift')}</p>
              </div>
            `).join('')}
          </div>
        `;
      }

      return `
        <div class="gift-grid">
          ${items.map(item => `
            <div class="gift-card">
              <img src="${escapeHtml(item.img)}" alt="${escapeHtml(item.name || 'gift')}" loading="lazy" onerror="this.style.opacity='.15'" />
              <p class="gift-name">${escapeHtml(item.name || 'Gift')}</p>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderTextBlock(style, text) {
      switch (style) {
        case STYLE.H1:
          return `<h2 class="style-h1">${escapeHtml(text)}</h2>`;
        case STYLE.H2:
          return `<h3 class="style-h2">${escapeHtml(text)}</h3>`;
        case STYLE.INFO:
          return `<p class="style-info">${escapeHtml(text)}</p>`;
        case STYLE.WARNING:
          return `<p class="style-warning">${escapeHtml(text)}</p>`;
        case STYLE.TEXT:
        default:
          return `<p class="style-text">${escapeHtml(text)}</p>`;
      }
    }

    function renderSection(rows) {
      let html = '';
      const rewardRows = rows.filter(r => r[2] === STYLE.REWARD);
      const galaRows = rows.filter(r => r[2] === STYLE.GALA);
      const giftRows = rows.filter(r => r[2] === STYLE.GIFT);

      rows.forEach(row => {
        const style = row[2];
        const text = getLocalizedText(row);

        if ([STYLE.REWARD, STYLE.GALA, STYLE.GIFT, STYLE.TAB1, STYLE.TAB2].includes(style)) {
          return;
        }

        if (!text) return;
        html += renderTextBlock(style, text);
      });

      if (rewardRows.length) {
        html += renderRewardTable(rewardRows);
      }

      if (galaRows.length) {
        html += renderGiftGrid(galaRows, true);
      }

      if (giftRows.length) {
        html += renderGiftGrid(giftRows, false);
      }

      return `
        <section class="section-card">
          <div class="section-body">
            ${html}
          </div>
        </section>
      `;
    }

    function buildTab(targetBlock, containerId) {
      const container = document.getElementById(containerId);
      const groups = groupByBlockChild(pageRows, targetBlock);
      const keys = Object.keys(groups).sort((a, b) => Number(a) - Number(b));

      if (!keys.length) {
        container.innerHTML = `
          <div class="state-box">
            <h3 class="state-title">Нет данных</h3>
            <p class="state-text">Контент пока недоступен.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = keys.map(key => renderSection(groups[key])).join('');
    }

    function buildPage() {
      buildTab('1', 'content-tab1');
      buildTab('2', 'content-tab2');
    }

    function showError(message) {
      document.getElementById('content-tab1').innerHTML = `
        <div class="state-box">
          <h3 class="state-title">Ошибка загрузки</h3>
          <p class="state-text">${escapeHtml(message || 'Не удалось загрузить данные')}</p>
          <button class="retry-btn" onclick="retryInit()">Повторить</button>
        </div>
      `;

      document.getElementById('content-tab2').innerHTML = `
        <div class="state-box">
          <h3 class="state-title">Ошибка загрузки</h3>
          <p class="state-text">Контент вкладки недоступен.</p>
        </div>
      `;
    }

    async function retryInit() {
      document.getElementById('loader').classList.remove('hidden');
      await init();
    }

    async function init() {
      try {
        setLoaderText('Подключаем лист webpage…');
        const rawRows = await fetchSheet(WEBPAGE_URL);

        setLoaderText('Обрабатываем структуру…');
        pageRows = normalizeRows(rawRows);

        parseTabsMeta(pageRows);

        setLoaderText('Собираем страницу…');
        buildPage();

        setTimeout(() => {
          document.getElementById('loader').classList.add('hidden');
          document.getElementById('loader').setAttribute('aria-busy', 'false');
        }, 220);
      } catch (err) {
        console.error(err);
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('loader').setAttribute('aria-busy', 'false');
        showError(err?.message || 'Неизвестная ошибка');
      }
    }

    init();
  </script>
</body>
</html>
