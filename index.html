<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Дино-Мундиаль</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #f6f8fb;
  --surface: #ffffff;
  --surface-soft: #fbfcfe;
  --line: #e6edf4;
  --line-strong: #d9e3ee;

  --text: #233142;
  --text-soft: #607284;
  --text-faint: #8a9aaa;

  --accent: #5d86b3;
  --accent-soft: #edf4fb;
  --accent-line: #d7e5f3;

  --gold: #b79a63;
  --gold-soft: #f6f1e7;

  --danger: #ba6d6d;

  --shadow-sm: 0 6px 18px rgba(34, 56, 79, 0.04);
  --shadow-md: 0 14px 34px rgba(34, 56, 79, 0.06);

  --radius-lg: 20px;
  --radius-md: 16px;
  --radius-sm: 12px;

  --container: 980px;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  font-size: 15px;
  -webkit-text-size-adjust: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 12% 10%, rgba(183,154,99,0.05), transparent 24%),
    radial-gradient(circle at 88% 6%, rgba(93,134,179,0.05), transparent 28%),
    linear-gradient(180deg, #f9fbfd 0%, #f6f8fb 100%);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

img {
  display: block;
  max-width: 100%;
}

button {
  font: inherit;
}

/* LOADER */
#loader {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(249, 251, 253, 0.9);
  backdrop-filter: blur(8px);
  transition: opacity .35s ease, visibility .35s ease;
}

#loader.hidden {
  opacity: 0;
  visibility: hidden;
}

.loader-box {
  width: min(92vw, 320px);
  padding: 1.4rem 1.2rem;
  border-radius: 22px;
  background: rgba(255,255,255,0.94);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-md);
  text-align: center;
}

.loader-icon {
  font-size: 1.8rem;
  margin-bottom: .6rem;
}

.loader-title {
  font-family: 'Montserrat', sans-serif;
  font-size: .84rem;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: .35rem;
}

#loader-text {
  color: var(--text-soft);
  font-size: .92rem;
  line-height: 1.55;
}

.loader-line {
  height: 4px;
  border-radius: 999px;
  background: #eef3f8;
  margin-top: .9rem;
  overflow: hidden;
}

.loader-line > span {
  display: block;
  width: 34%;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  animation: lineMove 1.15s ease-in-out infinite;
}

@keyframes lineMove {
  0% { transform: translateX(-120%); }
  100% { transform: translateX(320%); }
}

.page {
  max-width: var(--container);
  margin: 0 auto;
  padding: 1rem 1rem 2rem;
}

/* TOP BAR — no border */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .8rem;
  margin-bottom: 1rem;
  padding: .2rem 0 .35rem;
}

.topbar-brand {
  min-width: 0;
  font-family: 'Montserrat', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-soft);
  white-space: nowrap;
}

.topbar-brand em {
  font-style: normal;
  color: var(--accent);
}

.lang-switch {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  padding: .2rem;
  border-radius: 999px;
  background: rgba(255,255,255,.74);
  border: 1px solid rgba(230,237,244,.9);
  flex-shrink: 0;
}

.lang-btn {
  border: 0;
  background: transparent;
  color: var(--text-soft);
  padding: .5rem .82rem;
  min-height: 38px;
  border-radius: 999px;
  cursor: pointer;
  font-family: 'Montserrat', sans-serif;
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  transition: .18s ease;
}

.lang-btn.active {
  background: var(--accent);
  color: #fff;
}

/* TABS */
.tabs-shell {
  margin-bottom: 1rem;
}

.tabs {
  display: inline-flex;
  gap: .38rem;
  padding: .26rem;
  border-radius: 999px;
  background: rgba(255,255,255,.9);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-sm);
}

.tab-btn {
  border: 0;
  background: transparent;
  color: var(--text-soft);
  padding: .7rem 1rem;
  min-height: 42px;
  border-radius: 999px;
  cursor: pointer;
  font-family: 'Montserrat', sans-serif;
  font-size: .73rem;
  font-weight: 700;
  letter-spacing: .05em;
  transition: .18s ease;
  white-space: nowrap;
}

.tab-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 4px 12px rgba(34,56,79,0.05);
}

/* PANELS */
.tab-panel {
  display: none;
}

.tab-panel.active {
  display: block;
}

.panel-stack {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* BLOCKS */
.block-frame {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: rgba(255,255,255,0.94);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}

.block-header {
  padding: .95rem 1rem .8rem;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, #ffffff, #fbfcfe);
}

.block-header-title {
  font-family: 'Montserrat', sans-serif;
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  line-height: 1.35;
}

.block-body {
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: .72rem;
}

.s-header1 {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(1.04rem, 2.2vw, 1.32rem);
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
}

.s-header2 {
  font-family: 'Montserrat', sans-serif;
  font-size: .98rem;
  font-weight: 700;
  line-height: 1.35;
  color: var(--gold);
}

.s-header3 {
  padding: .78rem .88rem;
  border: 1px solid var(--accent-line);
  border-radius: var(--radius-sm);
  background: var(--accent-soft);
  color: var(--text);
  font-size: .9rem;
  line-height: 1.6;
  font-weight: 600;
}

.s-text {
  font-size: .92rem;
  line-height: 1.76;
  color: var(--text-soft);
}

.s-info {
  padding: .8rem .9rem;
  border: 1px solid #ebe3d2;
  border-radius: var(--radius-sm);
  background: var(--gold-soft);
  color: #7c6a45;
  font-size: .87rem;
  line-height: 1.68;
}

/* TABLE */
.reward-wrap {
  width: 100%;
}

.reward-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  background: #fff;
}

.reward-table thead th {
  padding: .78rem .55rem;
  background: #f8fafc;
  border-bottom: 1px solid var(--line);
  color: var(--text-faint);
  font-family: 'Montserrat', sans-serif;
  font-size: .66rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.35;
  word-break: break-word;
}

.reward-table thead th:first-child,
.reward-table tbody td:first-child {
  text-align: left;
}

.reward-table tbody tr:not(:last-child) td {
  border-bottom: 1px solid var(--line);
}

.reward-table tbody td {
  padding: .75rem .55rem;
  color: var(--text-soft);
  font-size: .84rem;
  line-height: 1.45;
  text-align: center;
  vertical-align: middle;
  word-break: break-word;
}

.reward-table tbody td:first-child {
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  font-size: .76rem;
  font-weight: 700;
}

.reward-table tbody td:nth-child(2) {
  color: var(--accent);
  font-weight: 600;
}

.reward-table tbody td:last-child {
  color: var(--gold);
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
}

/* GIFTS */
.gifts-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: .5rem;
}

.gift-card {
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  padding: .62rem .24rem .48rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: .28rem;
  min-height: 98px;
}

.gift-card img {
  width: 38px;
  height: 38px;
  object-fit: contain;
  margin-bottom: .08rem;
}

.gift-name {
  margin: 0;
  text-align: center;
  color: var(--text-faint);
  font-family: 'Montserrat', sans-serif;
  font-size: .52rem;
  font-weight: 700;
  text-transform: uppercase;
  line-height: 1.18;
  letter-spacing: .01em;
  max-width: 100%;
  word-break: normal;
  overflow-wrap: anywhere;
  hyphens: auto;
}

/* RULES */
.rules-block {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: rgba(255,255,255,0.94);
  box-shadow: var(--shadow-sm);
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: .55rem;
}

.rules-section-title {
  padding-top: .15rem;
  margin-top: .1rem;
  font-family: 'Montserrat', sans-serif;
  font-size: .74rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
}

.rules-h2 {
  font-family: 'Montserrat', sans-serif;
  font-size: .92rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1.35;
}

.rules-text {
  font-size: .88rem;
  color: var(--text-soft);
  line-height: 1.72;
}

.rules-info {
  padding: .72rem .82rem;
  border: 1px solid var(--accent-line);
  border-radius: 12px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: .83rem;
  line-height: 1.62;
}

.rules-warning {
  padding: .72rem .82rem;
  border: 1px solid #eadfca;
  border-radius: 12px;
  background: var(--gold-soft);
  color: #866f43;
  font-size: .83rem;
  line-height: 1.62;
}

.rules-formula {
  padding: .78rem .88rem;
  border: 1px dashed var(--line-strong);
  border-radius: 12px;
  background: #fcfdff;
  color: var(--accent);
  font-family: 'Montserrat', sans-serif;
  font-size: .82rem;
  font-weight: 700;
  line-height: 1.55;
  text-align: center;
}

/* STATES */
.state-box {
  padding: 1.2rem 1rem;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: rgba(255,255,255,0.94);
  box-shadow: var(--shadow-sm);
  text-align: center;
}

.state-title {
  margin: 0 0 .4rem;
  font-family: 'Montserrat', sans-serif;
  font-size: .9rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text);
}

.state-text {
  margin: 0;
  color: var(--text-soft);
  font-size: .9rem;
  line-height: 1.68;
}

.retry-btn {
  margin-top: .9rem;
  border: 0;
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  min-height: 42px;
  padding: 0 1rem;
  cursor: pointer;
  font-family: 'Montserrat', sans-serif;
  font-size: .74rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
}

footer {
  max-width: var(--container);
  margin: 0 auto;
  padding: .2rem 1rem 1.8rem;
  text-align: center;
}

footer p {
  margin: 0;
  color: var(--text-faint);
  font-family: 'Montserrat', sans-serif;
  font-size: .67rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  line-height: 1.6;
}

footer em {
  font-style: normal;
  color: var(--accent);
}

@media (max-width: 640px) {
  .page {
    padding: .75rem .75rem 1.6rem;
  }

  .topbar {
    margin-bottom: .85rem;
    padding-bottom: .2rem;
  }

  .topbar-brand {
    font-size: .74rem;
    letter-spacing: .08em;
  }

  .lang-switch {
    background: transparent;
    border: 0;
    padding: 0;
  }

  .lang-btn {
    padding: .42rem .62rem;
    min-height: 34px;
    font-size: .65rem;
  }

  .tabs-shell {
    margin-bottom: .85rem;
  }

  .tabs {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .3rem;
    padding: .24rem;
    border-radius: 16px;
  }

  .tab-btn {
    min-width: 0;
    width: 100%;
    padding: .7rem .55rem;
    min-height: 40px;
    border-radius: 12px;
    font-size: .64rem;
    line-height: 1.2;
    white-space: normal;
    text-align: center;
  }

  .panel-stack {
    gap: .8rem;
  }

  .block-header,
  .block-body,
  .rules-block {
    padding-left: .85rem;
    padding-right: .85rem;
  }

  .block-body,
  .rules-block {
    padding-top: .9rem;
    padding-bottom: .9rem;
  }

  .reward-table thead th {
    padding: .68rem .38rem;
    font-size: .58rem;
    letter-spacing: .05em;
  }

  .reward-table tbody td {
    padding: .68rem .38rem;
    font-size: .75rem;
  }

  .reward-table tbody td:first-child {
    font-size: .68rem;
  }

  .gift-card {
    min-height: 86px;
    padding: .48rem .14rem .38rem;
    gap: .2rem;
  }

  .gift-card img {
    width: 28px;
    height: 28px;
  }

  .gift-name {
    font-size: .43rem;
    line-height: 1.08;
    letter-spacing: 0;
  }

  footer p {
    font-size: .62rem;
    letter-spacing: .1em;
  }
}

@media (max-width: 420px) {
  html {
    font-size: 14px;
  }

  .topbar {
    gap: .55rem;
  }

  .topbar-brand {
    font-size: .7rem;
    max-width: 45%;
    white-space: normal;
    line-height: 1.3;
  }

  .lang-btn {
    padding: .4rem .52rem;
    min-height: 32px;
  }

  .tab-btn {
    font-size: .61rem;
    padding: .66rem .46rem;
  }
}
</style>
</head>
<body>

<div id="loader" aria-live="polite" aria-busy="true">
  <div class="loader-box">
    <div class="loader-icon">⚽</div>
    <div class="loader-title">Дино-Мундиаль</div>
    <div id="loader-text">Загрузка данных…</div>
    <div class="loader-line"><span></span></div>
  </div>
</div>

<div class="page">
  <div class="topbar">
    <div class="topbar-brand">⚽ Bigo Live <em>СНГ</em></div>
    <div class="lang-switch" role="group" aria-label="Выбор языка">
      <button class="lang-btn active" onclick="setLang('rus')" id="btn-rus" aria-pressed="true">🇷🇺 RUS</button>
      <button class="lang-btn" onclick="setLang('uzb')" id="btn-uzb" aria-pressed="false">🇺🇿 UZB</button>
    </div>
  </div>

  <div class="tabs-shell">
    <div class="tabs" role="tablist" aria-label="Навигация по разделам">
      <button class="tab-btn active" id="tab-main" role="tab" aria-selected="true" aria-controls="panel-main" onclick="setTab('main')">
        Общие условия
      </button>
      <button class="tab-btn" id="tab-rules" role="tab" aria-selected="false" aria-controls="panel-rules" onclick="setTab('rules')">
        Правила мероприятия
      </button>
    </div>
  </div>

  <section id="panel-main" class="tab-panel active" role="tabpanel" aria-labelledby="tab-main">
    <div class="panel-stack" id="page-blocks"></div>
  </section>

  <section id="panel-rules" class="tab-panel" role="tabpanel" aria-labelledby="tab-rules">
    <div class="panel-stack" id="rules-content"></div>
  </section>
</div>

<footer>
  <p>⚽ <em>Дино-Мундиаль</em> · 16–20 июля 2026 · Bigo Live СНГ</p>
</footer>

<script>
const SHEET_ID  = '1o9RJDu_bTcp4rlGMC4nMKZu3VPuixmzmVFgboBYWwt4';
const MAIN_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
const RULES_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=1286274957`;

const ROW_TYPES = {
  H1: 'Header 1',
  H2: 'Header 2',
  H3: 'Header 3',
  TEXT: 'Text',
  INFO: 'infotext',
  REWARD: 'RewardTable',
  GIFT: 'GiftTable',
  TITLE: 'Title',
  WARNING: 'Warningtext',
  FORMULA: 'formulatext'
};

let currentLang = 'rus';
let currentTab = 'main';
let mainData = [];
let rulesData = [];

function escapeHtml(str = '') {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function langCol() {
  return currentLang === 'rus' ? 2 : 3;
}

function getLocalizedText(row, preferredIndex = langCol(), fallbackIndex = 2) {
  return String((row?.[preferredIndex] || row?.[fallbackIndex] || '')).trim();
}

function extractGoogleVizJson(text) {
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  if (start === -1 || end === -1 || end <= start) {
    throw new Error('Некорректный ответ от Google Sheets');
  }
  return JSON.parse(text.slice(start, end + 1));
}

function isSafeUrl(url) {
  try {
    const u = new URL(url);
    return u.protocol === 'https:' || u.protocol === 'http:';
  } catch {
    return false;
  }
}

function parseImgName(cell) {
  const m = String(cell).match(/^(.*?)\s+(https?:\/\/\S+)$/);
  if (!m) return { name: String(cell || '').trim(), img: '' };
  const name = (m[1] || '').trim();
  const img = (m[2] || '').trim();
  return { name, img: isSafeUrl(img) ? img : '' };
}

function formatNumber(value, locale = 'ru-RU') {
  const normalized = String(value || '').replace(/[^\d.-]/g, '');
  const num = Number(normalized);
  return Number.isFinite(num) ? num.toLocaleString(locale) : '';
}

function setLoaderText(text) {
  const el = document.getElementById('loader-text');
  if (el) el.textContent = text;
}

function groupRowsByBlock(rows) {
  const blocks = {};
  rows.forEach(row => {
    const block = row?.[0];
    if (!block || block === 'Block') return;
    if (!blocks[block]) blocks[block] = [];
    blocks[block].push(row);
  });
  return blocks;
}

function createSafeDiv(className, text) {
  return `<div class="${className}">${escapeHtml(text)}</div>`;
}

async function fetchSheet(url) {
  const res = await fetch(url, { cache: 'no-store' });

  if (!res.ok) {
    throw new Error(`Ошибка загрузки (${res.status})`);
  }

  const text = await res.text();
  const json = extractGoogleVizJson(text);

  if (!json.table || !Array.isArray(json.table.rows)) {
    throw new Error('Неверный формат данных таблицы');
  }

  return json.table.rows.map(row =>
    (row.c || []).map(cell =>
      (cell && cell.v !== null && cell.v !== undefined) ? String(cell.v).trim() : ''
    )
  );
}

/* TABS */
function setTab(tab) {
  currentTab = tab;

  const isMain = tab === 'main';

  document.getElementById('tab-main').classList.toggle('active', isMain);
  document.getElementById('tab-rules').classList.toggle('active', !isMain);

  document.getElementById('tab-main').setAttribute('aria-selected', String(isMain));
  document.getElementById('tab-rules').setAttribute('aria-selected', String(!isMain));

  document.getElementById('panel-main').classList.toggle('active', isMain);
  document.getElementById('panel-rules').classList.toggle('active', !isMain);
}

/* MAIN */
function renderRewardTable(headers, rows) {
  const safeHeaders = headers.map(h => escapeHtml(h || ''));
  let html = `
    <div class="reward-wrap">
      <table class="reward-table">
        <thead>
          <tr>${safeHeaders.map(h => `<th>${h}</th>`).join('')}</tr>
        </thead>
        <tbody>
  `;

  rows.forEach(r => {
    html += `
      <tr>
        <td>${escapeHtml(r[0] || '')}</td>
        <td>${escapeHtml(formatNumber(r[1]))}</td>
        <td>${escapeHtml(formatNumber(r[2]))}</td>
      </tr>
    `;
  });

  html += `
        </tbody>
      </table>
    </div>
  `;

  return html;
}

function renderGiftGrid(giftCells) {
  const cards = giftCells
    .map(cell => parseImgName(cell))
    .filter(item => item.img)
    .map(({ name, img }) => `
      <div class="gift-card">
        <img src="${escapeHtml(img)}" alt="${escapeHtml(name || 'gift')}" loading="lazy" onerror="this.style.opacity='.15'"/>
        <div class="gift-name">${escapeHtml(name || 'Gift')}</div>
      </div>
    `)
    .join('');

  return cards ? `<div class="gifts-grid">${cards}</div>` : '';
}

function buildSection(rows, skipTitle = false) {
  let html = '';
  let rewardRows = [];
  let giftCells = [];
  let skippedH1 = false;

  rows.forEach(row => {
    const style = row[1];
    const text = getLocalizedText(row);

    if (!text && style !== ROW_TYPES.REWARD && style !== ROW_TYPES.GIFT) return;

    if (style === ROW_TYPES.H1) {
      if (!skippedH1 && skipTitle) {
        skippedH1 = true;
        return;
      }
      html += createSafeDiv('s-header1', text);
      return;
    }

    switch (style) {
      case ROW_TYPES.H2:
        html += createSafeDiv('s-header2', text);
        break;
      case ROW_TYPES.H3:
        html += createSafeDiv('s-header3', text);
        break;
      case ROW_TYPES.TEXT:
        html += createSafeDiv('s-text', text);
        break;
      case ROW_TYPES.INFO:
        html += createSafeDiv('s-info', text);
        break;
      case ROW_TYPES.REWARD:
        rewardRows.push(text.split(',').map(s => s.trim()));
        break;
      case ROW_TYPES.GIFT:
        text.split(',').forEach(c => giftCells.push(c.trim()));
        break;
      default:
        if (text) html += createSafeDiv('s-text', text);
        break;
    }
  });

  if (rewardRows.length) {
    const [header, ...body] = rewardRows;
    html += renderRewardTable(header, body);
  }

  if (giftCells.length) {
    html += renderGiftGrid(giftCells);
  }

  return html;
}

function buildMain() {
  const container = document.getElementById('page-blocks');
  const blocks = groupRowsByBlock(mainData);

  if (!Object.keys(blocks).length) {
    container.innerHTML = `
      <div class="state-box">
        <h3 class="state-title">Нет данных</h3>
        <p class="state-text">Контент пока недоступен.</p>
      </div>
    `;
    return;
  }

  let html = '';

  Object.keys(blocks)
    .sort((a, b) => Number(a) - Number(b))
    .forEach(blockNum => {
      const rows = blocks[blockNum];
      let blockTitle = '';

      rows.forEach(r => {
        if (r[1] === ROW_TYPES.H1 && !blockTitle) {
          blockTitle = getLocalizedText(r);
        }
      });

      html += `<section class="block-frame">`;

      if (blockTitle) {
        html += `
          <div class="block-header">
            <div class="block-header-title">${escapeHtml(blockTitle)}</div>
          </div>
        `;
      }

      html += `
        <div class="block-body">
          ${buildSection(rows, Boolean(blockTitle))}
        </div>
      </section>
      `;
    });

  container.innerHTML = html;
}

/* RULES */
function buildRules() {
  const container = document.getElementById('rules-content');
  const blocks = groupRowsByBlock(rulesData);

  if (!Object.keys(blocks).length) {
    container.innerHTML = `
      <div class="state-box">
        <h3 class="state-title">Нет правил</h3>
        <p class="state-text">Контент пока недоступен.</p>
      </div>
    `;
    return;
  }

  let html = '';

  Object.keys(blocks)
    .sort((a, b) => Number(a) - Number(b))
    .forEach(blockNum => {
      html += `<section class="rules-block">`;

      blocks[blockNum].forEach(row => {
        const style = row[1];
        const text = getLocalizedText(row);
        if (!text) return;

        switch (style) {
          case ROW_TYPES.TITLE:
            break;
          case ROW_TYPES.H1:
            html += createSafeDiv('rules-section-title', text);
            break;
          case ROW_TYPES.H2:
            html += createSafeDiv('rules-h2', text);
            break;
          case ROW_TYPES.TEXT:
            html += createSafeDiv('rules-text', text);
            break;
          case ROW_TYPES.INFO:
            html += createSafeDiv('rules-info', text);
            break;
          case ROW_TYPES.WARNING:
            html += createSafeDiv('rules-warning', text);
            break;
          case ROW_TYPES.FORMULA:
            html += createSafeDiv('rules-formula', text);
            break;
          default:
            html += createSafeDiv('rules-text', text);
            break;
        }
      });

      html += `</section>`;
    });

  container.innerHTML = html;
}

function setLang(lang) {
  currentLang = lang;

  const isRus = lang === 'rus';
  document.getElementById('btn-rus').classList.toggle('active', isRus);
  document.getElementById('btn-uzb').classList.toggle('active', !isRus);
  document.getElementById('btn-rus').setAttribute('aria-pressed', String(isRus));
  document.getElementById('btn-uzb').setAttribute('aria-pressed', String(!isRus));

  buildMain();
  buildRules();
}

function showError(message) {
  document.getElementById('page-blocks').innerHTML = `
    <div class="state-box">
      <h3 class="state-title">Ошибка загрузки</h3>
      <p class="state-text">${escapeHtml(message || 'Не удалось загрузить данные')}</p>
      <button class="retry-btn" onclick="retryInit()">Повторить</button>
    </div>
  `;

  document.getElementById('rules-content').innerHTML = `
    <div class="state-box">
      <h3 class="state-title">Ошибка загрузки</h3>
      <p class="state-text">Раздел правил также недоступен.</p>
    </div>
  `;
}

async function retryInit() {
  document.getElementById('loader').classList.remove('hidden');
  await init();
}

async function init() {
  try {
    setLoaderText('Подключаем таблицы…');

    const [main, rules] = await Promise.all([
      fetchSheet(MAIN_URL),
      fetchSheet(RULES_URL)
    ]);

    mainData = main;
    rulesData = rules;

    setLoaderText('Собираем страницу…');

    buildMain();
    buildRules();

    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('loader').setAttribute('aria-busy', 'false');
    }, 220);

  } catch (err) {
    console.error(err);
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('loader').setAttribute('aria-busy', 'false');
    showError(err?.message || 'Неизвестная ошибка');
  }
}

init();
</script>
</body>
</html>
