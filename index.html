<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Дино-Мундиаль</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>

:root {
  --bg:        #0f0f13;
  --bg2:       #16161d;
  --bg3:       #1c1c26;
  --accent:    #6c63ff;
  --accent2:   #9d97ff;
  --gold:      #f0c040;
  --gold2:     #c9960a;
  --white:     #f2f2f5;
  --muted:     #8888aa;
  --border:    rgba(108,99,255,0.25);
  --border2:   rgba(108,99,255,0.12);
  --card:      rgba(255,255,255,0.03);
  --glow:      0 0 24px rgba(108,99,255,0.35);
  --glow-gold: 0 0 24px rgba(240,192,64,0.4);
  --radius:    12px;
  --radius-sm: 8px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:15px; }

body {
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── LOADER ── */
#loader {
  position:fixed; inset:0;
  background:var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:9999;
  transition:opacity 0.5s;
  gap:1rem;
}
.loader-icon { font-size:3rem; animation:spin 1.2s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loader p {
  font-family:'Montserrat',sans-serif;
  font-weight:700; font-size:0.75rem;
  letter-spacing:0.3em; color:var(--muted);
  text-transform:uppercase;
}
.loader-bar { width:120px; height:2px; background:var(--bg3); border-radius:2px; overflow:hidden; }
.loader-bar-fill {
  width:40%; height:100%;
  background:var(--accent); border-radius:2px;
  animation:barMove 1s ease-in-out infinite alternate;
}
@keyframes barMove {
  from { transform:translateX(-100%); }
  to   { transform:translateX(250%); }
}

/* ── LANG BAR ── */
#lang-bar {
  position:sticky; top:0; z-index:100;
  background:rgba(15,15,19,0.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border2);
  display:flex; justify-content:space-between; align-items:center;
  padding:0.7rem 1.2rem;
}
.lang-bar-logo {
  font-family:'Montserrat',sans-serif;
  font-size:0.8rem; font-weight:800;
  letter-spacing:0.12em; color:var(--muted);
  text-transform:uppercase;
}
.lang-bar-logo em { font-style:normal; color:var(--accent2); }
.lang-btns { display:flex; gap:0.35rem; }
.lang-btn {
  padding:0.4rem 1rem; border-radius:6px;
  border:1px solid var(--border);
  background:transparent; color:var(--muted);
  cursor:pointer; font-weight:700; font-size:0.75rem;
  letter-spacing:0.1em; text-transform:uppercase;
  font-family:'Montserrat',sans-serif; transition:all 0.2s;
}
.lang-btn.active {
  background:var(--accent); color:#fff;
  border-color:var(--accent); box-shadow:var(--glow);
}
.lang-btn:hover:not(.active) { border-color:var(--accent2); color:var(--accent2); }

/* ── MAIN ── */
#main-content { opacity:0; transition:opacity 0.4s; position:relative; z-index:1; }
#main-content.loaded { opacity:1; }

/* ── PAGE WRAPPER ── */
#page-blocks {
  max-width:600px; margin:0 auto;
  padding:1.2rem;
  display:flex; flex-direction:column; gap:1rem;
}

/* ── BLOCK FRAME ── */
.block-frame {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
}

/* ── BLOCK HEADER BAR ── */
.block-header {
  background:linear-gradient(135deg, rgba(108,99,255,0.15), rgba(108,99,255,0.05));
  border-bottom:1px solid var(--border2);
  padding:0.9rem 1.2rem;
  display:flex; align-items:center; gap:0.6rem;
}
.block-header-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--accent); box-shadow:var(--glow); flex-shrink:0;
}
.block-header-title {
  font-family:'Montserrat',sans-serif;
  font-weight:800; font-size:0.8rem;
  letter-spacing:0.18em; text-transform:uppercase;
  color:var(--accent2);
}

/* ── BLOCK BODY ── */
.block-body {
  padding:1.2rem;
  display:flex; flex-direction:column; gap:0.6rem;
}

/* ── HEADER 1 (centered, no repeat in body) ── */
.s-header1 {
  font-family:'Montserrat',sans-serif;
  font-weight:800;
  font-size:clamp(1.1rem, 4vw, 1.35rem);
  letter-spacing:0.04em;
  color:var(--white);
  text-align:center;
  padding:0.4rem 0 0.6rem;
  position:relative;
}
.s-header1::after {
  content:'';
  display:block; width:36px; height:2px;
  background:linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius:2px; margin:0.4rem auto 0;
}

/* ── HEADER 2 ── */
.s-header2 {
  font-family:'Montserrat',sans-serif;
  font-weight:800;
  font-size:clamp(1rem, 3.5vw, 1.15rem);
  color:var(--gold); text-align:center;
  padding:0.3rem 0; letter-spacing:0.02em;
}

/* ── HEADER 3 ── */
.s-header3 {
  font-family:'Montserrat',sans-serif;
  font-weight:700; font-size:0.88rem;
  color:var(--white);
  padding:0.75rem 1rem;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border2);
  border-left:3px solid var(--accent);
  border-radius:var(--radius-sm);
  line-height:1.55;
}

/* ── TEXT ── */
.s-text {
  font-size:0.88rem; color:var(--muted);
  line-height:1.75; font-weight:400;
}

/* ── INFO TEXT ── */
.s-info {
  background:rgba(108,99,255,0.08);
  border-left:3px solid var(--accent);
  border-radius:0 6px 6px 0;
  padding:0.6rem 0.9rem;
  font-size:0.85rem; color:var(--accent2);
  line-height:1.6;
  font-family:'Inter',sans-serif;
}

/* ── REWARD TABLE ── */
.reward-wrap {
  overflow-x:auto; border-radius:var(--radius-sm);
  border:1px solid var(--border2); margin-top:0.2rem;
}
.reward-table { width:100%; border-collapse:collapse; font-size:0.84rem; }
.reward-table thead tr { background:rgba(108,99,255,0.15); }
.reward-table thead th {
  font-family:'Montserrat',sans-serif;
  font-weight:700; font-size:0.7rem;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--accent2); padding:0.75rem 0.8rem;
  text-align:center; white-space:nowrap;
  border-bottom:1px solid var(--border);
}
.reward-table thead th:first-child { text-align:left; }
.reward-table tbody tr {
  border-bottom:1px solid var(--border2); transition:background 0.2s;
}
.reward-table tbody tr:last-child { border-bottom:none; }
.reward-table tbody tr:hover { background:rgba(108,99,255,0.05); }
.reward-table tbody td { padding:0.65rem 0.8rem; text-align:center; color:var(--muted); }
.reward-table tbody td:first-child {
  text-align:left; color:var(--white);
  font-weight:600; font-family:'Montserrat',sans-serif; font-size:0.8rem;
}
.reward-table tbody td:nth-child(2) { color:var(--accent2); font-weight:600; }
.reward-table tbody td:last-child {
  color:var(--gold); font-weight:700;
  font-family:'Montserrat',sans-serif;
}

/* ── GIFT GRID — always 5 columns ── */
.gifts-grid {
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:0.5rem;
}
.gift-card {
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  padding:0.65rem 0.25rem 0.5rem;
  text-align:center;
  display:flex; flex-direction:column;
  align-items:center; gap:0.3rem;
  transition:all 0.2s; cursor:default;
  position:relative; overflow:hidden;
}
.gift-card::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, var(--accent), var(--accent2));
  opacity:0; transition:opacity 0.2s;
}
.gift-card:hover {
  border-color:rgba(108,99,255,0.5);
  background:rgba(108,99,255,0.08);
  transform:translateY(-3px); box-shadow:var(--glow);
}
.gift-card:hover::before { opacity:1; }
.gift-card img {
  width:44px; height:44px; object-fit:contain;
  transition:transform 0.2s;
}
.gift-card:hover img { transform:scale(1.12); }
.gift-name {
  font-family:'Montserrat',sans-serif;
  font-size:0.56rem; font-weight:700;
  letter-spacing:0.02em; color:var(--muted);
  text-transform:uppercase; line-height:1.3;
  word-break:break-word; text-align:center;
}

/* ── RULES FAB ── */
#rules-fab {
  position:fixed; bottom:1.2rem; right:1.2rem; z-index:500;
  height:46px; padding:0 1.3rem; border-radius:23px;
  background:var(--accent); border:none; cursor:pointer;
  display:flex; align-items:center; gap:0.5rem;
  font-family:'Montserrat',sans-serif; font-size:0.78rem;
  font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
  color:#fff; box-shadow:0 4px 20px rgba(108,99,255,0.5);
  transition:all 0.2s;
}
#rules-fab:hover {
  background:var(--accent2); transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(108,99,255,0.6);
}

/* ── OVERLAY ── */
#rules-overlay {
  position:fixed; inset:0; background:rgba(8,8,12,0.75);
  z-index:600; opacity:0; pointer-events:none;
  transition:opacity 0.25s; backdrop-filter:blur(4px);
}
#rules-overlay.open { opacity:1; pointer-events:all; }

/* ── DRAWER ── */
#rules-drawer {
  position:fixed; top:0; right:-100%;
  width:min(420px,100vw); height:100vh;
  background:var(--bg2); border-left:1px solid var(--border);
  z-index:700; overflow-y:auto;
  transition:right 0.35s cubic-bezier(0.4,0,0.2,1);
  display:flex; flex-direction:column;
}
#rules-drawer.open { right:0; }
.drawer-header {
  background:rgba(108,99,255,0.12);
  border-bottom:1px solid var(--border);
  padding:1rem 1.2rem;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:1; backdrop-filter:blur(12px);
}
.drawer-header h2 {
  font-family:'Montserrat',sans-serif;
  font-size:0.85rem; font-weight:800;
  letter-spacing:0.15em; text-transform:uppercase; color:var(--white);
}
#close-drawer {
  width:32px; height:32px; border-radius:8px;
  background:rgba(255,255,255,0.07);
  border:1px solid var(--border); color:var(--muted);
  font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
#close-drawer:hover {
  background:rgba(255,80,80,0.15);
  border-color:rgba(255,80,80,0.4); color:#ff6b6b;
  transform:rotate(90deg);
}
.drawer-body { padding:1.2rem; flex:1; display:flex; flex-direction:column; gap:0.5rem; }
.rules-section-title {
  font-family:'Montserrat',sans-serif; font-weight:800;
  font-size:0.82rem; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--accent2); padding:0.7rem 0 0.4rem;
  border-bottom:1px solid var(--border2); margin-bottom:0.1rem;
}
.rules-section-title:first-child { padding-top:0; }
.rules-h2 {
  font-family:'Montserrat',sans-serif; font-weight:700;
  font-size:0.88rem; color:var(--gold); text-align:center; padding:0.3rem 0;
}
.rules-text { font-size:0.84rem; color:var(--muted); line-height:1.72; }
.rules-info {
  background:rgba(108,99,255,0.08); border-left:3px solid var(--accent);
  border-radius:0 6px 6px 0; padding:0.6rem 0.9rem;
  font-size:0.83rem; color:var(--accent2); line-height:1.6;
}
.rules-warning {
  background:rgba(240,192,64,0.07); border-left:3px solid var(--gold);
  border-radius:0 6px 6px 0; padding:0.6rem 0.9rem;
  font-size:0.83rem; color:var(--gold); line-height:1.6;
}
.rules-formula {
  background:rgba(0,230,118,0.06); border:1px dashed rgba(0,230,118,0.3);
  border-radius:8px; padding:0.75rem 1rem;
  font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.88rem;
  color:#00e676; text-align:center; letter-spacing:0.04em;
}

/* ── FOOTER ── */
footer {
  text-align:center; padding:2rem 1rem;
  background:var(--bg); border-top:1px solid var(--border2);
  position:relative; z-index:1;
}
footer p {
  font-family:'Montserrat',sans-serif; font-size:0.7rem;
  font-weight:700; letter-spacing:0.2em; text-transform:uppercase;
  color:rgba(136,136,170,0.4);
}
footer p em { font-style:normal; color:var(--accent2); opacity:0.7; }

/* ── ERROR ── */
.error-box {
  background:rgba(255,50,50,0.06); border:1px solid rgba(255,80,80,0.25);
  border-radius:var(--radius); padding:2rem 1.5rem; text-align:center; color:#ff8888;
}
.error-box h3 {
  font-family:'Montserrat',sans-serif; font-weight:800;
  font-size:1rem; margin-bottom:0.5rem; letter-spacing:0.1em;
}
.error-box p { font-size:0.82rem; color:rgba(255,136,136,0.6); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--accent); border-radius:2px; }

/* ── MOBILE ── */
@media(max-width:480px) {
  #page-blocks { padding:0.8rem; gap:0.8rem; }
  .block-body { padding:0.9rem; gap:0.5rem; }
  #rules-fab { bottom:0.8rem; right:0.8rem; height:42px; font-size:0.72rem; }
  .gift-card img { width:36px; height:36px; }
  .gift-name { font-size:0.52rem; }
  .gifts-grid { gap:0.3rem; }
}

</style>
</head>
<body>

<div id="loader">
  <div class="loader-icon">⚽</div>
  <p id="loader-text">Loading</p>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="lang-bar">
  <div class="lang-bar-logo">⚽ Bigo Live <em>СНГ</em></div>
  <div class="lang-btns">
    <button class="lang-btn active" onclick="setLang('rus')" id="btn-rus">🇷🇺 RUS</button>
    <button class="lang-btn"        onclick="setLang('uzb')" id="btn-uzb">🇺🇿 UZB</button>
  </div>
</div>

<div id="main-content">
  <div id="page-blocks"></div>
</div>

<button id="rules-fab" onclick="openDrawer()">
  📋 <span id="fab-label">Правила</span>
</button>

<div id="rules-overlay" onclick="closeDrawer()"></div>

<div id="rules-drawer">
  <div class="drawer-header">
    <h2 id="drawer-title">📋 Правила</h2>
    <button id="close-drawer" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<footer>
  <p>⚽ <em>Дино-Мундиаль</em> · 16–20 июля 2026 · Bigo Live СНГ</p>
</footer>

<script>
const SHEET_ID  = '1o9RJDu_bTcp4rlGMC4nMKZu3VPuixmzmVFgboBYWwt4';
const MAIN_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
const RULES_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=1286274957`;

let currentLang = 'rus';
let mainData    = [];
let rulesData   = [];

/* ── Fetch ── */
async function fetchSheet(url) {
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
  return json.table.rows.map(row =>
    row.c.map(cell => (cell && cell.v !== null && cell.v !== undefined) ? String(cell.v).trim() : '')
  );
}

function parseImgName(cell) {
  const m = cell.match(/^(.*?)\s+(https?:\/\/\S+)$/);
  return m ? { name: m[1].trim(), img: m[2].trim() } : { name: cell, img: '' };
}

function langCol() { return currentLang === 'rus' ? 2 : 3; }

/* ══ BUILD MAIN ══ */
function buildMain() {
  const container = document.getElementById('page-blocks');
  container.innerHTML = '';

  /* Group rows by Block number */
  const blocks = {};
  mainData.forEach(row => {
    const b = row[0];
    if (!b || b === 'Block') return;
    if (!blocks[b]) blocks[b] = [];
    blocks[b].push(row);
  });

  Object.keys(blocks)
    .sort((a, b) => Number(a) - Number(b))
    .forEach(blockNum => {
      const rows = blocks[blockNum];
      const lc   = langCol();

      /* First Header 1 → block title bar */
      let blockTitle = '';
      rows.forEach(r => {
        if (r[1] === 'Header 1' && !blockTitle)
          blockTitle = (r[lc] || r[2] || '').trim();
      });

      /* Build frame */
      const frame = document.createElement('div');
      frame.className = 'block-frame';

      if (blockTitle) {
        const hdr = document.createElement('div');
        hdr.className = 'block-header';
        hdr.innerHTML = `<div class="block-header-dot"></div>
                         <div class="block-header-title">${blockTitle}</div>`;
        frame.appendChild(hdr);
      }

      const body = document.createElement('div');
      body.className = 'block-body';
      buildSection(body, rows, blockTitle);   // pass title to skip it inside body
      frame.appendChild(body);
      container.appendChild(frame);
    });
}

/* ══ SECTION BUILDER ══ */
function buildSection(el, rows, skipTitle) {
  const lc = langCol();
  let html        = '';
  let giftCells   = [];
  let rewardRows  = [];
  let skippedH1   = false;

  rows.forEach(row => {
    const style = row[1];
    const text  = (row[lc] || row[2] || '').trim();

    /* Skip first Header 1 — already shown in block-header bar */
    if (style === 'Header 1') {
      if (!skippedH1 && skipTitle) { skippedH1 = true; return; }
      html += `<div class="s-header1">${text}</div>`;
      return;
    }

    switch (style) {
      case 'Header 2':
        html += `<div class="s-header2">${text}</div>`;
        break;
      case 'Header 3':
        html += `<div class="s-header3">${text}</div>`;
        break;
      case 'Text':
        html += `<div class="s-text">${text}</div>`;
        break;
      case 'infotext':
        html += `<div class="s-info">${text}</div>`;
        break;
      case 'RewardTable':
        rewardRows.push(text.split(',').map(s => s.trim()));
        break;
      case 'GiftTable':
        text.split(',').forEach(c => giftCells.push(c.trim()));
        break;
      default:
        if (text) html += `<div class="s-text">${text}</div>`;
    }
  });

  /* ── Reward table ── */
  if (rewardRows.length) {
    const [header, ...body] = rewardRows;
    html += `<div class="reward-wrap"><table class="reward-table">
      <thead><tr>${header.map(h => `<th>${h}</th>`).join('')}</tr></thead>
      <tbody>`;
    body.forEach(r => {
      const col2 = r[1] ? Number(r[1].replace(/\D/g,'')).toLocaleString('ru-RU') : '';
      const col3 = r[2] ? Number(r[2].replace(/\D/g,'')).toLocaleString('ru-RU') : '';
      html += `<tr><td>${r[0]||''}</td><td>${col2}</td><td>${col3}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  }

  /* ── Gift grid (always 5 cols) ── */
  if (giftCells.length) {
    html += `<div class="gifts-grid">`;
    giftCells.forEach(cell => {
      const { name, img } = parseImgName(cell);
      if (!img) return;
      html += `<div class="gift-card">
        <img src="${img}" alt="${name}" loading="lazy" onerror="this.style.opacity='.12'"/>
        <div class="gift-name">${name}</div>
      </div>`;
    });
    html += `</div>`;
  }

  el.innerHTML += html;
}

/* ══ RULES DRAWER ══ */
function buildRules() {
  const lc   = langCol();
  const body = document.getElementById('drawer-body');
  let html   = '';
  const blocks = {};

  rulesData.forEach(row => {
    const b = row[0];
    if (!b || b === 'Block') return;
    if (!blocks[b]) blocks[b] = [];
    blocks[b].push(row);
  });

  Object.keys(blocks).sort((a,b)=>Number(a)-Number(b)).forEach(blockNum => {
    blocks[blockNum].forEach(row => {
      const style = row[1];
      const text  = (row[lc] || row[2] || '').trim();
      if (!text) return;
      switch (style) {
        case 'Title':
          document.getElementById('drawer-title').textContent = `📋 ${text}`;
          document.getElementById('fab-label').textContent    = text;
          break;
        case 'Header 1':
          html += `<div class="rules-section-title">${text}</div>`; break;
        case 'Header 2':
          html += `<div class="rules-h2">${text}</div>`; break;
        case 'Text':
          html += `<div class="rules-text">${text}</div>`; break;
        case 'infotext':
          html += `<div class="rules-info">${text}</div>`; break;
        case 'Warningtext':
          html += `<div class="rules-warning">${text}</div>`; break;
        case 'formulatext':
          html += `<div class="rules-formula">${text}</div>`; break;
        default:
          html += `<div class="rules-text">${text}</div>`;
      }
    });
  });

  body.innerHTML = html;
}

/* ══ LANG ══ */
function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-rus').classList.toggle('active', lang === 'rus');
  document.getElementById('btn-uzb').classList.toggle('active', lang === 'uzb');
  buildMain();
  buildRules();
}

/* ══ DRAWER ══ */
function openDrawer() {
  document.getElementById('rules-drawer').classList.add('open');
  document.getElementById('rules-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('rules-drawer').classList.remove('open');
  document.getElementById('rules-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

/* ══ INIT ══ */
async function init() {
  const loaderText = document.getElementById('loader-text');
  try {
    loaderText.textContent = 'Connecting...';
    [mainData, rulesData] = await Promise.all([
      fetchSheet(MAIN_URL),
      fetchSheet(RULES_URL)
    ]);
    loaderText.textContent = 'Building...';
    buildMain();
    buildRules();

    const loader  = document.getElementById('loader');
    const content = document.getElementById('main-content');
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 500);
    content.classList.add('loaded');

  } catch(err) {
    console.error(err);
    document.getElementById('loader').style.display = 'none';
    document.getElementById('main-content').classList.add('loaded');
    document.getElementById('page-blocks').innerHTML = `
      <div style="padding:2rem 1rem">
        <div class="error-box">
          <h3>⚠️ DATA LOAD ERROR</h3>
          <p>Make sure the Google Sheet is public (Anyone with link → Viewer)</p>
          <p style="margin-top:.4rem;font-size:.75rem">${err.message}</p>
        </div>
      </div>`;
  }
}

init();
</script>
</body>
</html>
